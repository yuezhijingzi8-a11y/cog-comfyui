build:
  gpu: true
  system_packages:
    - git
    - ffmpeg
  python_version: "3.10"
  python_packages:
    - torch==2.1.2
    - torchvision==0.16.2
    - torchaudio==2.1.2
    - comfy-cli
  run:
    - comfy --skip-prompt install
    - comfy --skip-prompt download --url https://huggingface.co/black-forest-labs/FLUX.2-dev --model flux2
    - comfy --skip-prompt download --url https://huggingface.co/black-forest-labs/FLUX.1-dev-vae --model vae

predict: "predict.py:Predictor"